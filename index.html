<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>育成高中機器人投球賽系統</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com/"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React & ReactDOM -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.21.4/babel.min.js"></script>

    <!-- Firebase SDK (Compat version) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        
        body { 
            background-color: #020204; 
            margin: 0; 
            font-family: 'Noto Sans TC', sans-serif;
            color: #e4e4e7;
        }
        .glass-panel { 
            background: rgba(24, 24, 27, 0.7); 
            backdrop-filter: blur(16px); 
            border: 1px solid rgba(255,255,255,0.1); 
        }
        .robot-glow {
            filter: drop-shadow(0 0 15px rgba(239, 68, 68, 0.3));
        }
        .rank-row:nth-child(1) .rank-num { color: #fbbf24; font-size: 1.25rem; }
        .rank-row:nth-child(2) .rank-num { color: #d1d5db; }
        .rank-row:nth-child(3) .rank-num { color: #d97706; }

        /* 自定義捲軸 */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Firebase 配置保持不變
        const firebaseConfig = {
            apiKey: "AIzaSyBTJbobhDm68TU19CrelfRJvlfwSni7b-o",
            authDomain: "excersise-d4003.firebaseapp.com",
            projectId: "excersise-d4003",
            storageBucket: "excersise-d4003.firebasestorage.app",
            messagingSenderId: "188132630421",
            appId: "1:188132630421:web:3a82d3e874bdbbe3e8e09c"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = "yu-cheng-robot-v5";

        function App() {
            const [user, setUser] = useState(null);
            const [limitRank, setLimitRank] = useState([]);    
            const [chalRank, setChalRank] = useState([]);      
            const [activeMode, setActiveMode] = useState(null); 
            const [timeLeft, setTimeLeft] = useState(60);      
            const [elapsedTime, setElapsedTime] = useState(0); 
            const [isTimerRunning, setIsTimerRunning] = useState(false);
            const [showForm, setShowForm] = useState(false);
            const [formData, setFormData] = useState({ name: '', score: '', photo: null });
            const [isSubmitting, setIsSubmitting] = useState(false);
            const fileInputRef = useRef(null);

            // 1. 初始化登入
            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged((curr) => {
                    if (curr) {
                        setUser(curr);
                        console.log("已連線:", curr.uid);
                    } else {
                        auth.signInAnonymously().catch(e => console.error("登入失敗:", e));
                    }
                });
                return () => unsubscribe();
            }, []);

            // 2. 監聽實時排行榜 (對應截圖中的資料路徑)
            useEffect(() => {
                if (!user) return;
                
                const limitRef = db.collection(`artifacts/${appId}/public/data/limit_mode`);
                const chalRef = db.collection(`artifacts/${appId}/public/data/chal_mode`);

                const unsub1 = limitRef.onSnapshot(s => {
                    const docs = s.docs.map(d => ({ id: d.id, ...d.data() }));
                    setLimitRank(docs.sort((a, b) => (b.score || 0) - (a.score || 0)).slice(0, 10));
                });

                const unsub2 = chalRef.onSnapshot(s => {
                    const docs = s.docs.map(d => ({ id: d.id, ...d.data() }));
                    setChalRank(docs.sort((a, b) => (a.timeSeconds || 0) - (b.timeSeconds || 0)).slice(0, 10));
                });

                return () => { unsub1(); unsub2(); };
            }, [user]);

            // 3. 計時器邏輯
            useEffect(() => {
                let interval;
                if (isTimerRunning) {
                    interval = setInterval(() => {
                        if (activeMode === 'LIMIT') {
                            setTimeLeft(t => {
                                if (t <= 0.1) {
                                    setIsTimerRunning(false);
                                    setShowForm(true);
                                    return 0;
                                }
                                return Number((t - 0.1).toFixed(1));
                            });
                        } else {
                            setElapsedTime(t => Number((t + 0.1).toFixed(1)));
                        }
                    }, 100);
                }
                return () => clearInterval(interval);
            }, [isTimerRunning, activeMode]);

            const startChallenge = (mode) => {
                setActiveMode(mode);
                setTimeLeft(60);
                setElapsedTime(0);
                setShowForm(false);
                setFormData({ name: '', score: '', photo: null });
                setIsTimerRunning(true);
            };

            // 4. 提交成績 (強化安全性與自動重連)
            const handleSubmit = async () => {
                if (!formData.name) return alert("請輸入挑戰者姓名");
                if (activeMode === 'LIMIT' && !formData.score) return alert("請輸入進球數");
                
                setIsSubmitting(true);

                // 檢查登入狀態，若丟失則即時補登
                let currentUser = auth.currentUser;
                if (!currentUser) {
                    try {
                        const cred = await auth.signInAnonymously();
                        currentUser = cred.user;
                    } catch (e) {
                        setIsSubmitting(false);
                        return alert("網路不穩定，請重新整理頁面再試。");
                    }
                }

                const collectionName = activeMode === 'LIMIT' ? 'limit_mode' : 'chal_mode';
                const payload = {
                    name: formData.name,
                    photo: formData.photo,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    timestamp: Date.now(),
                    ...(activeMode === 'LIMIT' ? { score: Number(formData.score) } : { timeSeconds: Number(elapsedTime) })
                };

                try {
                    await db.collection(`artifacts/${appId}/public/data/${collectionName}`).add(payload);
                    alert("成績上傳成功！");
                    setShowForm(false);
                    setActiveMode(null);
                } catch (err) {
                    console.error(err);
                    alert("上傳失敗，請檢查 Firebase 規則設定。");
                } finally {
                    setIsSubmitting(false);
                }
            };

            return (
                <div className="flex flex-col lg:flex-row min-h-screen">
                    {/* 控制區 */}
                    <div className="w-full lg:w-96 bg-zinc-950 p-6 flex flex-col border-r border-white/5">
                        <div className="flex items-center gap-3 mb-8">
                            <div className="w-10 h-10 bg-red-600 rounded-xl flex items-center justify-center shadow-lg shadow-red-600/20">
                                <i className="fas fa-robot text-white"></i>
                            </div>
                            <div>
                                <h1 className="text-xl font-black italic tracking-tighter">育成高中機器人賽</h1>
                                <p className="text-[10px] text-zinc-500 font-bold tracking-widest uppercase">Humanoid Shoot-out v5</p>
                            </div>
                        </div>

                        {/* 機器人展示區 */}
                        <div className="glass-panel rounded-3xl p-6 mb-8 flex items-center justify-center relative overflow-hidden group">
                            <div className="absolute inset-0 bg-gradient-to-t from-red-600/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
                            <img 
                                src="https://firebasestorage.googleapis.com/v0/b/excersise-d4003.firebasestorage.app/o/artifacts%2Fyu-cheng-robot-v5%2S__10477572.jpg?alt=media" 
                                className={`h-48 object-contain robot-glow transition-transform duration-500 ${isTimerRunning ? 'scale-110' : ''}`}
                                alt="Robot"
                            />
                        </div>

                        {/* 計時器/按鈕 */}
                        <div className="space-y-4 mb-8">
                            <div className="grid grid-cols-2 gap-3">
                                <button disabled={isTimerRunning} onClick={() => startChallenge('LIMIT')} className={`p-4 rounded-2xl border-2 transition-all ${activeMode==='LIMIT'?'border-red-500 bg-red-500/10 shadow-[0_0_15px_rgba(239,68,68,0.2)]':'border-zinc-800 bg-zinc-900/50'}`}>
                                    <div className="text-[10px] font-bold opacity-50 mb-1 uppercase">限時挑戰</div>
                                    <div className="text-2xl font-black text-red-500 tracking-tighter">{activeMode==='LIMIT'?timeLeft:'60.0'}s</div>
                                </button>
                                <button disabled={isTimerRunning} onClick={() => startChallenge('CHAL')} className={`p-4 rounded-2xl border-2 transition-all ${activeMode==='CHAL'?'border-blue-500 bg-blue-500/10 shadow-[0_0_15px_rgba(59,130,246,0.2)]':'border-zinc-800 bg-zinc-900/50'}`}>
                                    <div className="text-[10px] font-bold opacity-50 mb-1 uppercase">神速挑戰</div>
                                    <div className="text-2xl font-black text-blue-400 tracking-tighter">{activeMode==='CHAL'?elapsedTime:'0.0'}s</div>
                                </button>
                            </div>
                            
                            {activeMode === 'CHAL' && isTimerRunning && (
                                <button onClick={() => { setIsTimerRunning(false); setShowForm(true); }} className="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl font-black text-white shadow-xl transition-all active:scale-95">
                                    <i className="fas fa-stopwatch mr-2"></i> 我投進了！停止計時
                                </button>
                            )}
                        </div>

                        {/* 登錄表單 */}
                        {showForm && (
                            <div className="glass-panel p-5 rounded-3xl border-red-500/30 animate-in fade-in slide-in-from-bottom-4">
                                <div className="flex gap-4 mb-4">
                                    <div onClick={() => fileInputRef.current.click()} className="w-16 h-16 bg-black rounded-xl border border-dashed border-zinc-700 flex items-center justify-center cursor-pointer overflow-hidden">
                                        {formData.photo ? <img src={formData.photo} className="w-full h-full object-cover" /> : <i className="fas fa-camera text-zinc-600"></i>}
                                        <input type="file" ref={fileInputRef} className="hidden" accept="image/*" capture="environment" onChange={e => {
                                            const file = e.target.files[0];
                                            if(file) {
                                                const reader = new FileReader();
                                                reader.onload = () => setFormData({...formData, photo: reader.result});
                                                reader.readAsDataURL(file);
                                            }
                                        }}/>
                                    </div>
                                    <div className="flex-1 space-y-2">
                                        <input type="text" placeholder="挑戰者姓名" className="w-full bg-black border border-zinc-800 p-2 rounded-lg text-sm focus:border-red-500 outline-none" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} />
                                        {activeMode === 'LIMIT' && (
                                            <input type="number" placeholder="進球顆數" className="w-full bg-black border border-zinc-800 p-2 rounded-lg text-sm focus:border-red-500 outline-none" value={formData.score} onChange={e => setFormData({...formData, score: e.target.value})} />
                                        )}
                                    </div>
                                </div>
                                <button disabled={isSubmitting} onClick={handleSubmit} className="w-full bg-red-600 hover:bg-red-500 py-3 rounded-xl font-bold transition-all disabled:opacity-50">
                                    {isSubmitting ? <i className="fas fa-circle-notch fa-spin"></i> : "上傳英雄榜"}
                                </button>
                            </div>
                        )}
                    </div>

                    {/* 排行榜區 */}
                    <div className="flex-1 p-6 lg:p-10 flex flex-col gap-8 overflow-y-auto">
                        <section className="flex-1 min-h-0 flex flex-col">
                            <h2 className="text-xl font-black italic text-red-500 mb-4 flex items-center gap-2">
                                <i className="fas fa-trophy"></i> LIMIT MODE 英雄榜 (進球數)
                            </h2>
                            <div className="glass-panel rounded-3xl overflow-hidden flex-1 flex flex-col">
                                <div className="p-4 grid grid-cols-12 text-[10px] font-black text-zinc-500 uppercase tracking-widest border-b border-white/5">
                                    <div className="col-span-2 text-center">RANK</div>
                                    <div className="col-span-7">CHALLENGER</div>
                                    <div className="col-span-3 text-right">SCORE</div>
                                </div>
                                <div className="flex-1 overflow-y-auto">
                                    {limitRank.map((r, i) => (
                                        <div key={r.id} className="rank-row p-4 grid grid-cols-12 items-center hover:bg-white/5 border-b border-white/5 last:border-0">
                                            <div className="col-span-2 text-center font-black italic rank-num">{i+1}</div>
                                            <div className="col-span-7 flex items-center gap-3">
                                                <div className="w-10 h-10 rounded-lg bg-zinc-800 overflow-hidden border border-white/10">
                                                    {r.photo ? <img src={r.photo} className="w-full h-full object-cover" /> : <div className="w-full h-full flex items-center justify-center text-xs opacity-20 italic">No Pic</div>}
                                                </div>
                                                <div className="font-bold truncate">{r.name}</div>
                                            </div>
                                            <div className="col-span-3 text-right font-black text-xl italic text-red-500">{r.score}<span className="text-[10px] ml-1 font-normal opacity-40">G</span></div>
                                        </div>
                                    ))}
                                    {limitRank.length === 0 && <div className="p-10 text-center text-zinc-600 italic">尚未有挑戰紀錄...</div>}
                                </div>
                            </div>
                        </section>

                        <section className="flex-1 min-h-0 flex flex-col">
                            <h2 className="text-xl font-black italic text-blue-400 mb-4 flex items-center gap-2">
                                <i className="fas fa-bolt"></i> SPEED CHALLENGE 英雄榜 (秒數)
                            </h2>
                            <div className="glass-panel rounded-3xl overflow-hidden flex-1 flex flex-col">
                                <div className="p-4 grid grid-cols-12 text-[10px] font-black text-zinc-500 uppercase tracking-widest border-b border-white/5">
                                    <div className="col-span-2 text-center">RANK</div>
                                    <div className="col-span-7">CHALLENGER</div>
                                    <div className="col-span-3 text-right">TIME</div>
                                </div>
                                <div className="flex-1 overflow-y-auto">
                                    {chalRank.map((r, i) => (
                                        <div key={r.id} className="rank-row p-4 grid grid-cols-12 items-center hover:bg-white/5 border-b border-white/5 last:border-0">
                                            <div className="col-span-2 text-center font-black italic rank-num">{i+1}</div>
                                            <div className="col-span-7 flex items-center gap-3">
                                                <div className="w-10 h-10 rounded-lg bg-zinc-800 overflow-hidden border border-white/10">
                                                    {r.photo ? <img src={r.photo} className="w-full h-full object-cover" /> : <div className="w-full h-full flex items-center justify-center text-xs opacity-20 italic">No Pic</div>}
                                                </div>
                                                <div className="font-bold truncate">{r.name}</div>
                                            </div>
                                            <div className="col-span-3 text-right font-black text-xl italic text-blue-400">{r.timeSeconds}<span className="text-[10px] ml-1 font-normal opacity-40">S</span></div>
                                        </div>
                                    ))}
                                    {chalRank.length === 0 && <div className="p-10 text-center text-zinc-600 italic">尚未有挑戰紀錄...</div>}
                                </div>
                            </div>
                        </section>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
