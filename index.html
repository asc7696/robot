<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>育成高中人型機器人體驗活動系統</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React & ReactDOM (UMD) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.21.4/babel.min.js"></script>

    <!-- Firebase App (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <!-- Firebase Auth (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <!-- Firebase Firestore (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        body { background-color: #050507; margin: 0; padding: 0; overflow-x: hidden; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #050507; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        .glass-card { background: rgba(24, 24, 27, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        #root { min-height: 100vh; display: flex; flex-direction: column; }
        .active-glow-red { box-shadow: 0 0 20px rgba(239, 68, 68, 0.3); border-color: #ef4444 !important; }
        .active-glow-blue { box-shadow: 0 0 20px rgba(59, 130, 246, 0.3); border-color: #3b82f6 !important; }
    </style>
</head>
<body>
    <div id="root">
        <div style="color: white; text-align: center; margin-top: 50px; font-family: sans-serif;">
            系統初始化中，請稍候...
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Firebase 配置
        const firebaseConfig = {
            apiKey: "AIzaSyBTJbobhDm68TU19CrelfRJvlfwSni7b-o",
            authDomain: "excersise-d4003.firebaseapp.com",
            projectId: "excersise-d4003",
            storageBucket: "excersise-d4003.firebasestorage.app",
            messagingSenderId: "188132630421",
            appId: "1:188132630421:web:3a82d3e874bdbbe3e8e09c"
        };

        // 初始化 Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = "yu-cheng-robot-v5";

        function App() {
            const [user, setUser] = useState(null);
            const [limitRank, setLimitRank] = useState([]);    
            const [chalRank, setChalRank] = useState([]);      
            const [activeMode, setActiveMode] = useState(null); 
            const [timeLeft, setTimeLeft] = useState(60);      
            const [elapsedTime, setElapsedTime] = useState(0); 
            const [isTimerRunning, setIsTimerRunning] = useState(false);
            const [liveCommentary, setLiveCommentary] = useState("等待賽事啟動...");
            const [showForm, setShowForm] = useState(false);
            const [formData, setFormData] = useState({ name: '', score: '', photo: null });
            const [isSubmitting, setIsSubmitting] = useState(false);
            const fileInputRef = useRef(null);

            // 處理匿名登入
            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged((currUser) => {
                    if (currUser) {
                        console.log("已登錄:", currUser.uid);
                        setUser(currUser);
                    } else {
                        auth.signInAnonymously()
                            .catch(err => console.error("Auth Error:", err));
                    }
                });
                return () => unsubscribe();
            }, []);

            // 監聽排行榜
            useEffect(() => {
                if (!user) return;
                
                const limitPath = `artifacts/${appId}/public/data/limit_mode`;
                const chalPath = `artifacts/${appId}/public/data/chal_mode`;

                const unsubLimit = db.collection(limitPath)
                    .onSnapshot((s) => {
                        const data = s.docs.map(d => ({ id: d.id, ...d.data() }));
                        setLimitRank(data.sort((a, b) => (Number(b.score) || 0) - (Number(a.score) || 0)).slice(0, 10));
                    }, err => console.error("讀取限時賽失敗:", err));

                const unsubChal = db.collection(chalPath)
                    .onSnapshot((s) => {
                        const data = s.docs.map(d => ({ id: d.id, ...d.data() }));
                        setChalRank(data.sort((a, b) => (Number(a.timeSeconds) || 0) - (Number(b.timeSeconds) || 0)).slice(0, 10));
                    }, err => console.error("讀取神速賽失敗:", err));

                return () => { unsubLimit(); unsubChal(); };
            }, [user]);

            // 計時邏輯
            useEffect(() => {
                let timer;
                if (isTimerRunning) {
                    timer = setInterval(() => {
                        if (activeMode === 'LIMIT') {
                            setTimeLeft(prev => {
                                if (prev <= 1) {
                                    clearInterval(timer);
                                    setIsTimerRunning(false);
                                    setShowForm(true);
                                    setLiveCommentary("時間到！請記錄成績。");
                                    return 0;
                                }
                                return prev - 1;
                            });
                        } else if (activeMode === 'CHAL') {
                            setElapsedTime(prev => prev + 0.1);
                        }
                    }, 100);
                }
                return () => clearInterval(timer);
            }, [isTimerRunning, activeMode]);

            const startMode = (mode) => {
                setActiveMode(mode);
                setTimeLeft(60);
                setElapsedTime(0);
                setShowForm(false);
                setFormData({ name: '', score: '', photo: null });
                setIsTimerRunning(true);
                setLiveCommentary(mode === 'LIMIT' ? "限時挑戰開始！盡力投球！" : "神速挑戰開始！拼速度！");
            };

            const submitScore = async () => {
                if (!formData.name) return alert("請輸入挑戰者姓名");
                if (activeMode === 'LIMIT' && !formData.score) return alert("請輸入進球數");
                if (!user) return alert("資料庫未連線，請重新整理頁面");
                
                setIsSubmitting(true);
                const collectionName = activeMode === 'LIMIT' ? 'limit_mode' : 'chal_mode';
                const collectionPath = `artifacts/${appId}/public/data/${collectionName}`;
                
                const payload = {
                    name: formData.name,
                    photo: formData.photo,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    timestamp: Date.now(),
                    ...(activeMode === 'LIMIT' 
                        ? { score: Number(formData.score) } 
                        : { timeSeconds: Number(elapsedTime.toFixed(1)) }
                    )
                };

                try {
                    await db.collection(collectionPath).add(payload);
                    setShowForm(false);
                    setActiveMode(null);
                    setLiveCommentary("成績已成功上傳！");
                    alert("上傳成功！");
                } catch (err) {
                    console.error("Firebase Write Error:", err);
                    alert(`上傳失敗！原因: ${err.message}\n請確認 Firebase Rules 是否已開啟。`);
                } finally {
                    setIsSubmitting(false);
                }
            };

            return (
                <div className="min-h-screen w-full text-zinc-100 flex flex-col md:flex-row overflow-hidden font-sans bg-[#050507]">
                    {/* 左側控制面板 */}
                    <div className="w-full md:w-[400px] border-r border-white/5 bg-zinc-950 p-6 flex flex-col overflow-y-auto">
                        <header className="mb-8">
                            <div className="flex items-center gap-4 mb-2">
                                <div className="w-12 h-12 bg-red-600 rounded-2xl flex items-center justify-center shadow-lg shadow-red-600/20">
                                    <i className="fas fa-robot text-2xl text-white"></i>
                                </div>
                                <div>
                                    <h1 className="text-xl font-black text-white italic tracking-tighter">育成高中機器人賽</h1>
                                    <p className="text-[10px] text-zinc-500 font-bold tracking-widest uppercase">Humanoid Shoot-out v5</p>
                                </div>
                            </div>
                        </header>

                        <div className="mb-6 p-4 rounded-2xl bg-blue-600/10 border border-blue-500/20">
                            <div className="text-[10px] font-black text-blue-400 mb-1 flex items-center gap-2 uppercase tracking-widest">
                                <span className={`w-1.5 h-1.5 bg-red-500 rounded-full ${isTimerRunning ? 'animate-pulse' : ''}`}></span> Live Status
                            </div>
                            <p className="text-sm font-medium text-blue-100 italic">「 {liveCommentary} 」</p>
                        </div>

                        <div className="bg-zinc-900 rounded-3xl p-8 mb-6 flex justify-center items-center border border-white/5 relative min-h-[220px]">
                            <img 
                                src="https://firebasestorage.googleapis.com/v0/b/excersise-d4003.firebasestorage.app/o/artifacts%2Fyu-cheng-robot-v5%2FS__10477572_0-removebg-preview.jpg?alt=media" 
                                className={`h-48 object-contain transition-all duration-500 ${isTimerRunning ? 'scale-110 rotate-1 animate-pulse' : ''}`}
                                alt="Robot Avatar"
                                onError={(e) => { e.target.src = "https://img.icons8.com/color/144/robot.png"; }}
                            />
                        </div>

                        <div className="grid grid-cols-2 gap-3 mb-6">
                            <button disabled={isTimerRunning} onClick={() => startMode('LIMIT')} className={`p-4 rounded-2xl border-2 transition-all text-center ${activeMode === 'LIMIT' ? 'active-glow-red border-red-500 bg-red-500/10' : 'border-zinc-800 hover:border-zinc-700'}`}>
                                <div className="text-[10px] font-bold mb-1 opacity-60">限時賽 (60s)</div>
                                <div className="text-2xl font-black text-red-500">{activeMode === 'LIMIT' ? timeLeft : '60'}s</div>
                            </button>
                            <button disabled={isTimerRunning} onClick={() => startMode('CHAL')} className={`p-4 rounded-2xl border-2 transition-all text-center ${activeMode === 'CHAL' ? 'active-glow-blue border-blue-500 bg-blue-500/10' : 'border-zinc-800 hover:border-zinc-700'}`}>
                                <div className="text-[10px] font-bold mb-1 opacity-60">神速賽 (計時)</div>
                                <div className="text-2xl font-black text-blue-400">{activeMode === 'CHAL' ? elapsedTime.toFixed(1) : '0.0'}s</div>
                            </button>
                        </div>

                        {activeMode === 'CHAL' && isTimerRunning && (
                            <button onClick={() => { setIsTimerRunning(false); setShowForm(true); setLiveCommentary("完成挑戰！請輸入姓名。"); }} className="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl font-black text-lg mb-6 shadow-xl shadow-blue-600/20 active:scale-95 transition-all">
                                <i className="fas fa-stopwatch mr-2"></i> 投球完成！(停止計時)
                            </button>
                        )}

                        {showForm && (
                            <div className="bg-zinc-900 p-5 rounded-3xl border border-red-500/50 shadow-2xl mb-6 animate-in fade-in zoom-in duration-300">
                                <h3 className="font-bold mb-4 flex items-center gap-2 text-red-500 italic">🏆 登錄賽次成績</h3>
                                <div className="space-y-4">
                                    <div className="flex gap-4">
                                        <div onClick={() => fileInputRef.current.click()} className="w-20 h-20 bg-black rounded-xl border-2 border-dashed border-zinc-700 flex flex-col items-center justify-center cursor-pointer overflow-hidden group hover:border-red-500/50 transition-colors">
                                            {formData.photo ? <img src={formData.photo} className="w-full h-full object-cover" /> : <i className="fas fa-camera text-zinc-600 group-hover:text-zinc-400"></i>}
                                            <input type="file" ref={fileInputRef} className="hidden" accept="image/*" capture="environment" onChange={(e) => {
                                                const file = e.target.files[0];
                                                if (file) {
                                                    const reader = new FileReader();
                                                    reader.onload = () => setFormData({...formData, photo: reader.result});
                                                    reader.readAsDataURL(file);
                                                }
                                            }} />
                                        </div>
                                        <div className="flex-1 space-y-2">
                                            <input type="text" placeholder="挑戰者姓名" className="w-full bg-black p-3 rounded-lg border border-zinc-800 outline-none focus:border-red-500 transition-colors" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} />
                                            {activeMode === 'LIMIT' && (
                                                <input type="number" placeholder="本次進球數" className="w-full bg-black p-3 rounded-lg border border-zinc-800 outline-none focus:border-red-500 transition-colors" value={formData.score} onChange={e => setFormData({...formData, score: e.target.value})} />
                                            )}
                                        </div>
                                    </div>
                                    <button disabled={isSubmitting} onClick={submitScore} className="w-full bg-red-600 py-3 rounded-xl font-bold hover:bg-red-500 shadow-lg shadow-red-600/20 transition-all disabled:opacity-50">
                                        {isSubmitting ? <i className="fas fa-spinner fa-spin mr-2"></i> : <i className="fas fa-cloud-upload-alt mr-2"></i>}
                                        {isSubmitting ? "上傳中..." : "確認登錄成績"}
                                    </button>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* 右側排行榜展示 */}
                    <div className="flex-1 p-8 grid grid-rows-2 gap-8 overflow-hidden bg-[#050507]">
                        {/* 限時賽排行榜 */}
                        <div className="flex flex-col min-h-0">
                            <h2 className="text-xl font-black text-red-500 mb-4 flex items-center gap-2 italic">
                                <i className="fas fa-hourglass-half"></i> LIMIT MODE TOP 10
                            </h2>
                            <div className="flex-1 glass-card rounded-3xl overflow-y-auto border border-white/5">
                                <table className="w-full text-left">
                                    <thead className="sticky top-0 bg-zinc-950/90 backdrop-blur-md p-4 text-[10px] font-black text-zinc-500 uppercase tracking-widest border-b border-white/5">
                                        <tr><th className="p-4 text-center w-16">Rank</th><th className="p-4">Challenger</th><th className="p-4 text-right">Goals</th></tr>
                                    </thead>
                                    <tbody className="divide-y divide-white/5">
                                        {limitRank.length > 0 ? limitRank.map((r, i) => (
                                            <tr key={r.id || i} className="hover:bg-white/5 transition-colors">
                                                <td className="p-4 text-center">
                                                    <span className={`w-8 h-8 rounded-lg flex items-center justify-center font-black mx-auto ${i===0 ? 'bg-yellow-500 text-black' : i===1 ? 'bg-zinc-300 text-black' : i===2 ? 'bg-orange-400 text-black' : 'text-zinc-600 border border-zinc-800'}`}>{i+1}</span>
                                                </td>
                                                <td className="p-4 flex items-center gap-3">
                                                    <div className="w-10 h-10 rounded-full bg-zinc-800 overflow-hidden border border-white/10 shadow-inner">
                                                        {r.photo ? <img src={r.photo} className="w-full h-full object-cover" /> : <div className="w-full h-full flex items-center justify-center text-zinc-600 text-xs font-bold uppercase">{r.name?.charAt(0)}</div>}
                                                    </div>
                                                    <span className="font-bold truncate max-w-[120px]">{r.name}</span>
                                                </td>
                                                <td className="p-4 text-right font-black text-2xl text-red-500">
                                                    {r.score} <span className="text-[10px] opacity-40 font-normal">進球</span>
                                                </td>
                                            </tr>
                                        )) : (
                                            <tr><td colSpan="3" className="p-10 text-center text-zinc-600 italic">尚無挑戰紀錄...</td></tr>
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        {/* 神速賽排行榜 */}
                        <div className="flex flex-col min-h-0">
                            <h2 className="text-xl font-black text-blue-400 mb-4 flex items-center gap-2 italic">
                                <i className="fas fa-bolt"></i> SPEED CHALLENGE TOP 10
                            </h2>
                            <div className="flex-1 glass-card rounded-3xl overflow-y-auto border border-white/5">
                                <table className="w-full text-left">
                                    <thead className="sticky top-0 bg-zinc-950/90 backdrop-blur-md p-4 text-[10px] font-black text-zinc-500 uppercase tracking-widest border-b border-white/5">
                                        <tr><th className="p-4 text-center w-16">Rank</th><th className="p-4">Challenger</th><th className="p-4 text-right">Time</th></tr>
                                    </thead>
                                    <tbody className="divide-y divide-white/5">
                                        {chalRank.length > 0 ? chalRank.map((r, i) => (
                                            <tr key={r.id || i} className="hover:bg-white/5 transition-colors">
                                                <td className="p-4 text-center">
                                                    <span className={`w-8 h-8 rounded-lg flex items-center justify-center font-black mx-auto ${i===0 ? 'bg-yellow-500 text-black' : i===1 ? 'bg-zinc-300 text-black' : i===2 ? 'bg-orange-400 text-black' : 'text-zinc-600 border border-zinc-800'}`}>{i+1}</span>
                                                </td>
                                                <td className="p-4 flex items-center gap-3">
                                                    <div className="w-10 h-10 rounded-full bg-zinc-800 overflow-hidden border border-white/10 shadow-inner">
                                                        {r.photo ? <img src={r.photo} className="w-full h-full object-cover" /> : <div className="w-full h-full flex items-center justify-center text-zinc-600 text-xs font-bold uppercase">{r.name?.charAt(0)}</div>}
                                                    </div>
                                                    <span className="font-bold truncate max-w-[120px]">{r.name}</span>
                                                </td>
                                                <td className="p-4 text-right font-black text-2xl text-blue-400">
                                                    {r.timeSeconds} <span className="text-[10px] opacity-40 font-normal">秒</span>
                                                </td>
                                            </tr>
                                        )) : (
                                            <tr><td colSpan="3" className="p-10 text-center text-zinc-600 italic">尚無挑戰紀錄...</td></tr>
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
